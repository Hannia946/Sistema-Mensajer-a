<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mensajería Segura </title>
    <style>
        :root {
            --primary: #4f46e5;
            --bg: #f3f4f6;
            --card: #ffffff;
            --text: #1f2937;
        }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .container { background: var(--card); border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); width: 100%; max-width: 450px; padding: 24px; box-sizing: border-box; }
        h2 { margin-top: 0; text-align: center; color: var(--primary); }
        .hidden { display: none !important; }
        .form-group { margin-bottom: 16px; }
        label { display: block; margin-bottom: 6px; font-weight: 500; font-size: 14px; }
        input { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        button { width: 100%; padding: 10px; background: var(--primary); color: white; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 15px; margin-bottom: 8px; transition: background 0.2s; }
        button:hover { background: #4338ca; }
        button.secondary { background: #10b981; }
        button.secondary:hover { background: #059669; }
        
        /* Estilos del Chat */
        #chat-box { border: 1px solid #e5e7eb; border-radius: 8px; height: 250px; overflow-y: auto; padding: 12px; background: #fafafa; margin-bottom: 16px; }
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 8px; max-width: 80%; width: fit-content; }
        .msg.me { background: #e0e7ff; margin-left: auto; color: #3730a3; }
        .msg.other { background: #e5e7eb; margin-right: auto; }
        .msg-meta { font-size: 11px; font-weight: bold; margin-bottom: 2px; }
    </style>
</head>
<body>

    <div class="container">
        <div id="auth-section">
            <h2>LOGIN</h2>
            <div class="form-group">
                <label for="username">Usuario:</label>
                <input type="text" id="username" placeholder="Usuario">
            </div>
            <div class="form-group">
                <label for="password">Contraseña:</label>
                <input type="password" id="password" placeholder="********">
            </div>
            <button id="btn-login">Iniciar Sesión</button>
            <button id="btn-register" class="secondary">Registrarse</button>
        </div>

        <div id="chat-section" class="hidden">
            <h2 id="welcome-user">¡Hola!</h2>
            
            <div class="form-group">
                <label for="destinatario">Chatear con:</label>
                <input type="text" id="destinatario" placeholder="Destinatario">
            </div>
            
            <button id="btn-refresh" class="secondary">Actualizar/Leer Mensajes</button>
            
            <div id="chat-box">
                </div>
            
            <div class="form-group" style="display: flex; gap: 8px;">
                <input type="text" id="mensaje-texto" placeholder="Escribir mensaje...">
                <button id="btn-send" style="width: auto; margin: 0; padding: 0 20px;">Enviar</button>
            </div>
            <button id="btn-logout" style="background: #ef4444; margin-top: 10px;">Cerrar Sesión</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
